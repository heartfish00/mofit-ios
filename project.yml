name: Mofit
options:
  bundleIdPrefix: com.mofit
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0"

targets:
  Mofit:
    type: application
    platform: iOS
    sources:
      - path: Mofit
        excludes:
          - "Config/Secrets.example.swift"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mofit.app
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "Mofit은 iPhone 카메라로 스쿼트 자세·횟수를 분석합니다. 영상은 저장/전송되지 않고 온디바이스에서 즉시 폐기됩니다."
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: SwiftData.framework
      - sdk: AVFoundation.framework
      - sdk: Vision.framework
      - sdk: Security.framework

  MofitTests:
    type: bundle.unit-test
    platform: iOS
    dependencies:
      - target: Mofit
    sources:
      - path: MofitTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mofit.tests
        GENERATE_INFOPLIST_FILE: YES
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

schemes:
  Mofit:
    build:
      targets:
        Mofit: all
    run:
      config: Debug
    archive:
      config: Release
    test:
      targets:
        - MofitTests
      config: Debug
